<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #14210C;
    background: #ffffff;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  img { max-width: 100%; display: block; }
  ::selection { background: #C2E5A8; color: #14210C; }
  html { scroll-behavior: smooth; }
  :root { --ceka-primary: #369507; }

  /* ── Scroll reveal animations ── */
  @keyframes ceka-fade-up {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes ceka-fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes ceka-slide-left {
    from { opacity: 0; transform: translateX(-36px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes ceka-slide-right {
    from { opacity: 0; transform: translateX(36px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes ceka-scale-up {
    from { opacity: 0; transform: scale(0.94) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .ceka-reveal          { opacity: 0; }
  .ceka-reveal-left     { opacity: 0; }
  .ceka-reveal-right    { opacity: 0; }
  .ceka-reveal-fade     { opacity: 0; }
  .ceka-reveal-scale    { opacity: 0; }

  .ceka-reveal.visible       { animation: ceka-fade-up   0.65s cubic-bezier(.22,.8,.22,1) both; }
  .ceka-reveal-left.visible  { animation: ceka-slide-left  0.65s cubic-bezier(.22,.8,.22,1) both; }
  .ceka-reveal-right.visible { animation: ceka-slide-right 0.65s cubic-bezier(.22,.8,.22,1) both; }
  .ceka-reveal-fade.visible  { animation: ceka-fade-in   0.7s ease both; }
  .ceka-reveal-scale.visible { animation: ceka-scale-up  0.65s cubic-bezier(.22,.8,.22,1) both; }

  /* Hero entrance (fires on load, no IntersectionObserver needed) */
  @keyframes ceka-hero-in {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .ceka-hero-badge { animation: ceka-hero-in 0.6s 0.05s cubic-bezier(.22,.8,.22,1) both; }
  .ceka-hero-h1    { animation: ceka-hero-in 0.7s 0.18s cubic-bezier(.22,.8,.22,1) both; }
  .ceka-hero-desc  { animation: ceka-hero-in 0.7s 0.32s cubic-bezier(.22,.8,.22,1) both; }
  .ceka-hero-btns  { animation: ceka-hero-in 0.7s 0.46s cubic-bezier(.22,.8,.22,1) both; }
  .ceka-hero-tags  { animation: ceka-hero-in 0.6s 0.58s cubic-bezier(.22,.8,.22,1) both; }

  /* Respect reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .ceka-reveal, .ceka-reveal-left, .ceka-reveal-right,
    .ceka-reveal-fade, .ceka-reveal-scale,
    .ceka-hero-badge, .ceka-hero-h1, .ceka-hero-desc,
    .ceka-hero-btns, .ceka-hero-tags {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  }

  /* Responsive */
  @media (max-width: 980px) {
    .ceka-hero-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .ceka-why-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .ceka-about-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    .ceka-contact-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    .ceka-footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
    .ceka-process-arrow { display: none !important; }
  }
  @media (max-width: 720px) {
    .ceka-desktop-nav, .ceka-desktop-cta { display: none !important; }
    .ceka-mobile-burger { display: flex !important; }
    .ceka-form-row { grid-template-columns: 1fr !important; }
    .ceka-footer-grid { grid-template-columns: 1fr !important; gap: 28px !important; }
    .ceka-hero-image-wrap { aspect-ratio: 4/4 !important; }
    /* Full-width hero buttons on mobile */
    .ceka-hero-buttons { flex-direction: column !important; }
    .ceka-hero-buttons > button { width: 100% !important; justify-content: center !important; }
    /* Why Ceka cards: single column on small screens */
    .ceka-why-cards { grid-template-columns: 1fr !important; }
    /* About: image below text on mobile, stats 2-col */
    .ceka-about-image { order: 2 !important; }
    .ceka-about-stats { grid-template-columns: 1fr 1fr !important; }
    /* Contact submit button full width */
    .ceka-contact-submit { justify-content: stretch !important; }
    .ceka-contact-submit > button { width: 100% !important; justify-content: center !important; }
    /* Tighter mobile sections */
    section { padding-top: clamp(56px, 12vw, 80px) !important; padding-bottom: clamp(56px, 12vw, 80px) !important; }
  }
</style>
